<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Wiki 文档中心</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="description" content="Wiki 多项目文档中心">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//unpkg.com/docsify@4/lib/themes/vue.css">
  <style>
    :root {
      --primary-color: #42b983;
      --primary-light: rgba(66, 185, 131, 0.1);
      --text-primary: #2c3e50;
      --text-secondary: #6c757d;
      --text-muted: #adb5bd;
      --border-color: #e9ecef;
      --bg-light: #f8f9fa;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.12);
      --transition-fast: 0.2s ease;
      --transition-normal: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .app-name {
      display: none;
    }

    .sidebar {
      background: linear-gradient(180deg, #ffffff 0%, #fafbfc 100%);
      border-right: 1px solid var(--border-color);
    }

    .sidebar .app-title {
      margin: 0 0 8px 15px;
      font-size: 1.5rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--primary-color) 0%, #35a372 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      transition: var(--transition-normal);
    }

    .sidebar .app-title:hover {
      transform: translateX(4px);
    }

    .sidebar .app-title > a {
      color: inherit;
      text-decoration: none;
    }

    .sidebar-nav > ul > li {
      margin: 0;
    }

    .app-sub-sidebar li:before {
      padding-right: 0;
    }

    .sidebar-nav > ul > li > a {
      padding: 4px 8px;
      border-radius: 4px;
      transition: var(--transition-fast);
      font-weight: 500;
    }

    .sidebar-nav > ul > li > a:hover {
      background: var(--primary-light);
      color: var(--primary-color);
    }

    .sidebar-nav ul li a {
      padding: 3px 8px 3px 8px;
      border-radius: 4px;
      transition: var(--transition-fast);
    }

    .sidebar-nav ul li a:hover {
      background: var(--bg-light);
      color: var(--primary-color);
    }

    .sidebar-nav ul li.active > a {
      background: var(--primary-light);
      color: var(--primary-color);
      font-weight: 600;
    }

    .sidebar .search {
      padding: 12px;
      border-bottom: 1px solid var(--border-color);
      background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
      position: relative;
    }

    .sidebar .search input {
      width: 100%;
      padding: 12px 44px 12px 44px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      font-size: 14px;
      background: #ffffff;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%23adb5bd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>');
      background-repeat: no-repeat;
      background-position: 14px center;
      transition: var(--transition-normal);
      outline: none;
      box-shadow: var(--shadow-sm);
      color: var(--text-primary);
    }

    .sidebar .search input::placeholder {
      color: var(--text-muted);
    }

    .sidebar .search input:hover {
      border-color: #ced4da;
    }

    .sidebar .search input:focus {
      border-color: var(--primary-color);
      box-shadow: 0 0 0 4px var(--primary-light), var(--shadow-md);
      transform: translateY(-1px);
    }

    .sidebar .search .clear-button {
      color: var(--text-muted);
      position: absolute;
      top: 50%;
      right: 14px;
      transform: translateY(-50%);
      width: 24px;
      height: 24px;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: var(--transition-fast);
      cursor: pointer;
      background: transparent;
      border: none;
      font-size: 18px;
      z-index: 10;
    }

    .sidebar .search .clear-button.show {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    .sidebar .search .clear-button:hover {
      background: var(--bg-light);
      color: var(--text-secondary);
      transform: translateY(-50%) scale(1.1);
    }

    .sidebar .search .clear-button:active {
      transform: translateY(-50%) scale(0.95);
    }

    .sidebar .results-panel {
      border: none;
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      margin: 8px;
      overflow: hidden;
      background: #ffffff;
      animation: slideDown 0.3s ease;
    }

    .sidebar .matching-post {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-color);
      transition: var(--transition-fast);
      cursor: pointer;
    }

    .sidebar .matching-post:last-child {
      border-bottom: none;
    }

    .sidebar .matching-post:hover {
      background: var(--bg-light);
      transform: translateX(4px);
    }

    .sidebar .matching-post a {
      color: var(--text-primary);
    }

    .sidebar .matching-post h2 {
      font-size: 15px;
      margin: 0 0 6px 0;
      color: var(--text-primary);
      font-weight: 600;
    }

    .sidebar .matching-post p {
      font-size: 13px;
      color: var(--text-secondary);
      margin: 0;
      line-height: 1.5;
    }

    .sidebar .search-keyword {
      color: var(--primary-color);
      font-weight: 600;
      background: var(--primary-light);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .sidebar .no-data {
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
    }

    .markdown-section h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text-primary);
      border-bottom: 2px solid var(--border-color);
      padding-bottom: 0.5rem;
    }

    .markdown-section h2 {
      font-size: 1.8rem;
      font-weight: 600;
      margin: 2rem 0 1rem;
      color: var(--text-primary);
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.3rem;
    }

    .markdown-section h3 {
      font-size: 1.4rem;
      font-weight: 600;
      margin: 1.5rem 0 0.8rem;
      color: var(--text-primary);
    }

    .markdown-section p {
      line-height: 1.8;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }

    .markdown-section code {
      background: var(--bg-light);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      color: #e83e8c;
    }

    .markdown-section pre {
      background: #282c34;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 1.5rem 0;
      box-shadow: var(--shadow-md);
    }

    .markdown-section pre code {
      background: transparent;
      color: #abb2bf;
      padding: 0;
    }

    .markdown-section blockquote {
      border-left: 4px solid var(--primary-color);
      background: var(--primary-light);
      padding: 16px 20px;
      margin: 1.5rem 0;
      border-radius: 0 8px 8px 0;
    }

    .markdown-section blockquote p {
      margin: 0;
      color: var(--text-primary);
    }

    .markdown-section ul, .markdown-section ol {
      padding-left: 2rem;
      margin-bottom: 1rem;
    }

    .markdown-section li {
      margin: 0.5rem 0;
      line-height: 1.8;
      color: var(--text-secondary);
    }

    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
      margin: 1.5rem 0;
      box-shadow: var(--shadow-sm);
      border-radius: 8px;
      overflow: hidden;
    }

    .markdown-section th, .markdown-section td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .markdown-section th {
      background: var(--bg-light);
      font-weight: 600;
      color: var(--text-primary);
    }

    .markdown-section tr:hover {
      background: var(--bg-light);
    }

    .markdown-section a {
      color: var(--primary-color);
      text-decoration: none;
      transition: var(--transition-fast);
      border-bottom: 1px solid transparent;
    }

    .markdown-section a:hover {
      border-bottom-color: var(--primary-color);
    }

    .pagination-item {
      padding: 12px 20px;
      border-radius: 8px;
      transition: var(--transition-fast);
      background: var(--bg-light);
    }

    .pagination-item:hover {
      background: var(--primary-light);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .docsify-copy-code-button {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: #495057;
      cursor: pointer;
      transition: all 0.2s ease;
      opacity: 0;
      transform: translateY(-4px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      z-index: 10;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .markdown-section pre:hover .docsify-copy-code-button {
      opacity: 1;
      transform: translateY(0);
    }

    .docsify-copy-code-button:hover {
      background: var(--primary-color);
      color: #ffffff;
      border-color: var(--primary-color);
      box-shadow: 0 4px 12px rgba(66, 185, 131, 0.3);
      transform: translateY(-1px);
    }

    .docsify-copy-code-button:active {
      transform: translateY(0);
    }

    .docsify-copy-code-button.success {
      background: #28a745;
      color: #ffffff;
      border-color: #28a745;
    }

    .docsify-copy-code-button.error {
      background: #dc3545;
      color: #ffffff;
      border-color: #dc3545;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .sidebar .search {
        padding: 12px;
      }

      .sidebar .search input {
        padding: 10px 38px 10px 38px;
        font-size: 13px;
      }

      .markdown-section {
        padding: 20px;
      }

      .markdown-section h1 {
        font-size: 2rem;
      }

      .markdown-section h2 {
        font-size: 1.5rem;
      }

      .markdown-section h3 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Wiki 文档中心',
      repo: '',
      loadSidebar: true,
      alias: {
        // 匹配任意子目录下的_sidebar.md，重定向到该子目录的根_sidebar.md
        '/([^/]+)/_sidebar.md': '/$1/_sidebar.md',
        '/([^/]+)/.*/_sidebar.md': '/$1/_sidebar.md'
      },
      subMaxLevel: 4,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: '搜索文档...',
        noData: '找不到结果',
        depth: 4,
        hideOtherPathsContent: true
      },
      pagination: {
        crossChapter: true,
        crossChapterText: true
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      },
      plugins: [
        function (hook, vm) {
          hook.doneEach(function () {
            const appTitle = document.querySelector('.app-title');
            if (appTitle) {
              const title = appTitle.textContent.trim();
              if (title) {
                document.title = title + ' - ' + vm.config.name;
              }
            } else {
              document.title = vm.config.name;
            }
          });
        }
      ]
    }
  </script>
  <script src="//unpkg.com/docsify@4"></script>
  <script src="//unpkg.com/docsify/lib/plugins/search.min.js"></script>
  <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>
  <script src="//unpkg.com/docsify-copy-code"></script>
  <script src="//unpkg.com/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
</body>
</html>
